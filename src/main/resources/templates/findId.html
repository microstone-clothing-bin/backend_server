<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디 찾기</title>
</head>
<body>
<h1>아이디 찾기</h1>

<form th:action="@{/findId}" method="post">

    <div>
        <label for="nickname">닉네임:</label>
        <input type="text" id="nickname" name="nickname" required>
    </div>
    <div>
        <label for="email">이메일:</label>
        <input type="email" id="email" name="email" required>
    </div>
    <br>
    <input type="submit" value="아이디 찾기">
</form>

<div>
    <a th:href="@{/login.html}">로그인 페이지로 돌아가기</a>
</div>

<script th:if="${message != null}" th:inline="javascript">
    /*<![CDATA[*/

    var message = /*[[${message}]]*/ 'default message';
    alert(message);
    window.location.href = '/login.html'; // 팝업 후 페이지 이동 (선택사항)

    /*]]>*/
</script>

</body>
</html>
