<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<header th:fragment="headerFragment">
  <style>
    .navbar {
      background-color: #333;
      overflow: hidden;
      padding: 10px 20px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar a {
      color: white;
      text-decoration: none;
      padding: 0 10px;
    }
    .navbar-brand {
      font-size: 1.5em;
      font-weight: bold;
    }
    .navbar-user-info a {
      margin-left: 15px;
    }
  </style>

  <nav class="navbar">
    <div>
      <a th:href="@{/}" class="navbar-brand">ClothingBin Map</a>
      <a th:href="@{/share}">게시판</a>
    </div>
    <div class="navbar-user-info">
      <div th:if="${session.loginInfo == null}">
        <a th:href="@{/login.html}">로그인</a>
        <a th:href="@{/register.html}">회원가입</a>
      </div>
      <div th:if="${session.loginInfo != null}">
        <span th:text="|${session.loginInfo.nickname}님|"></span>
        <a th:href="@{/mypage}">마이페이지</a>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" style="background:none; border:none; color:white; cursor:pointer; padding:0 10px; font-size: 1em;">로그아웃</button>
        </form>
      </div>
    </div>
  </nav>
</header>
</html>
