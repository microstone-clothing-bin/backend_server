<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/form.css}"/>
</head>
<body>
<div class="form-container">
    <h1>회원가입</h1>

    <!-- action 주소 수정 및 CSRF 토큰 추가 -->
    <form th:action="@{/userReg}" method="post" onsubmit="return validateForm()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div>
            <label for="id">아이디:</label>
            <input type="text" id="id" name="id" required />
            <button type="button" onclick="checkDuplicate('id')">중복확인</button>
        </div>
        <div>
            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" required />
        </div>
        <div>
            <label for="passwordCheck">비밀번호 확인:</label>
            <input type="password" id="passwordCheck" name="passwordCheck" required />
        </div>
        <div>
            <label for="nickname">닉네임:</label>
            <input type="text" id="nickname" name="nickname" required />
            <button type="button" onclick="checkDuplicate('nickname')">중복확인</button>
        </div>
        <div>
            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" required />
        </div>
        <br>
        <button type="submit">회원가입</button>
    </form>
    <div class="links">
        <a th:href="@{/login.html}">이미 계정이 있으신가요? 로그인</a>
    </div>
</div>

<script>
    let idChecked = false;
    let nicknameChecked = false;

    function validateForm() {
        let id = document.getElementById('id').value;
        let pw = document.getElementById('password').value;
        let pwCheck = document.getElementById('passwordCheck').value;
        let email = document.getElementById('email').value;

        let koreanRegex = /[ㄱ-ㅎ|ㅏ-ㅣ|가-힣]/;
        if (koreanRegex.test(id) || koreanRegex.test(email) || koreanRegex.test(pw)) {
            alert("아이디, 이메일, 비밀번호에는 한글을 사용할 수 없습니다.");
            return false;
        }

        if (!idChecked) {
            alert("아이디 중복확인을 해주세요.");
            return false;
        }

        if (!nicknameChecked) {
            alert("닉네임 중복확인을 해주세요.");
            return false;
        }

        if (pw !== pwCheck) {
            alert("비밀번호와 비밀번호 확인이 일치하지 않습니다.");
            return false;
        }

        if (!email.includes("@")) {
            alert("올바른 이메일 형식을 입력하세요.");
            return false;
        }

        let pwRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_])[A-Za-z\d\W_]{8,20}$/;
        if (!pwRegex.test(pw)) {
            alert("비밀번호는 8~20자리이며, 영문 대소문자, 숫자, 특수문자를 모두 포함해야 합니다.");
            return false;
        }
        return true;
    }

    function checkDuplicate(type) {
        let value = document.getElementById(type).value;
        if (!value) {
            alert((type === 'id' ? '아이디' : '닉네임') + "을(를) 입력해주세요.");
            return;
        }

        fetch(`/api/checkDuplicate?type=${type}&value=${value}`)
            .then(response => response.text())
            .then(result => {
                if (result === "duplicate") {
                    alert("이미 사용 중인 " + (type === 'id' ? '아이디' : '닉네임') + "입니다.");
                    if (type === "id") idChecked = false;
                    else nicknameChecked = false;
                } else {
                    alert("사용 가능한 " + (type === 'id' ? '아이디' : '닉네임') + "입니다!");
                    if (type === "id") idChecked = true;
                    else nicknameChecked = true;
                }
            })
            .catch(error => console.error("Error:", error));
    }
</script>
</body>
</html>
