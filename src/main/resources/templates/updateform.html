<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"> <!-- 문자 인코딩 UTF-8 -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/> <!-- IE 호환 모드 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 뷰포트 설정 -->
    <title>게시물 수정</title> <!-- 브라우저 탭 제목 -->
    <link rel="stylesheet" th:href="@{/css/form.css}"/> <!-- CSS 스타일 적용 -->
</head>
<body>
<div class="form-container"> <!-- 폼 전체 컨테이너 -->
    <h1>게시물 수정</h1> <!-- 폼 제목 -->

    <!-- 게시물 수정 폼, POST 방식으로 /update 주소 호출 -->
    <form th:action="@{/update}" method="post">

        <!-- 수정할 게시물 ID를 숨겨서 전송 -->
        <input type="hidden" name="boardId" th:value="${board.boardId}" />

        <!-- 작성자 정보 (읽기 전용) -->
        <div>
            <label>작성자:</label>
            <input type="text" th:value="${loginInfo.nickname}" readonly/>
        </div>

        <!-- 게시물 제목 입력 -->
        <div>
            <label for="title">제목:</label>
            <input type="text" id="title" name="title" th:value="${board.title}" required />
        </div>

        <!-- 게시물 내용 입력 -->
        <div>
            <label for="content">내용:</label>
            <!-- textarea는 값 설정 시 [[${...}]] 문법 사용 -->
            <textarea id="content" name="content" cols="50" rows="10" required>[[${board.content}]]</textarea>
        </div>

        <br>

        <!-- 제출 버튼 -->
        <button type="submit">수정 완료</button>
        <!-- 취소 버튼: 원래 게시물 상세보기 페이지로 이동 -->
        <a th:href="@{/board(boardId=${board.boardId})}" class="btn-cancel">취소</a>
    </form>
</div>
</body>
</html>
